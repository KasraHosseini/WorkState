<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <title>WorkState | Mini App for Focusing & Managing Tasks</title>
  </head>
  <body>
    <header>
      <p>
        <i class="fa fa-box-alt"></i><span> Welcome to Work<strong>State</strong></span>
      </p>
      <div class="btn-bar">
        <button class="tab-toggle" data-target="#note"><i class="fa fa-note"></i></button>
        <button class="tab-toggle" data-target="#timer"><i class="fa fa-timer"></i></button>
        <button class="tab-toggle" data-target="#todo-list"><i class="fa fa-list"></i></button>
        <button class="theme-toggle"><i class="fa fa-sun-alt"></i></button>
      </div>
    </header>
    <main>
      <section class="actions">
        <div class="tab" id="todo-list">
          <div class="tab-panel">
            <button class="close-tab"><i class="fa fa-close"></i> close</button>
            <p class="tab-name">Todo List</p>
          </div>
          <div class="todo-input">
            <input type="text" placeholder="Write your task" id="todo-input" /><button id="todo-add"><i class="fa fa-add" dir="auto"></i></button>
          </div>
          <ul class="todo-list"></ul>
        </div>
        <div class="tab" id="timer">
          <div class="tab-panel">
            <button class="close-tab"><i class="fa fa-close"></i> close</button>
            <p class="tab-name">Timer</p>
          </div>
          <input type="text" class="timer-input" value="00:00" size="5" readonly placeholder="min:sec" />
          <div class="btn-bar">
            <button class="playpause-btn" onclick="playTimer('start','.timer-input','.playpause-btn')"><i class="fa fa-play"></i></button>
            <button class="reset-btn" onclick="resetTimer('.timer-input')"><i class="fa fa-refresh"></i></button>
            <button class="edit-btn" onclick="editTimer('edit','.edit-btn','.timer-input')"><i class="fa fa-pencil-alt"></i></button>
          </div>
          <div class="suggestions">
            <p>Suggestions</p>
            <button class="timer-suggestion" data-time-minute="5">05:00</button>
            <button class="timer-suggestion" data-time-minute="10">10:00</button>
            <button class="timer-suggestion" data-time-minute="30">30:00</button>
          </div>
        </div>
        <div class="tab" id="note">
          <div class="tab-panel">
            <button class="close-tab"><i class="fa fa-close"></i> close</button>
            <p class="tab-name">Note</p>
          </div>
          <textarea dir="auto" rows="8" placeholder="Write something" class="note"></textarea>
        </div>
      </section>
    </main>
    <footer>
      <div>
        <h1><i class="fa fa-box-alt"></i> Work<strong>State</strong></h1>
        <p>Focus. Organize. Succeed — anywhere, on any device.</p>
      </div>

      <ul class="social-btn">
        <li>
          <a href=""><i class="fab fa-github"></i></a>
        </li>
        <li>
          <a href=""><i class="fab fa-instagram"></i></a>
        </li>
        <li>
          <a href=""><i class="fab fa-linkedin-in"></i></a>
        </li>
      </ul>

      <button class="clear-memory">Clear Memory</button>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
